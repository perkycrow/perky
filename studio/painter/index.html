<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Paint Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #1a1a2e; }
        canvas { display: block; cursor: crosshair; touch-action: none; }
        .controls {
            position: fixed;
            top: 12px;
            left: 12px;
            display: flex;
            gap: 16px;
            align-items: center;
            z-index: 1;
            background: rgba(26, 26, 46, 0.85);
            padding: 8px 14px;
            border-radius: 8px;
        }
        .controls label {
            color: #aaa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .controls input[type="range"] { width: 100px; }
        .controls input[type="color"] {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: none;
        }
        .controls button {
            padding: 6px 14px;
            background: #333;
            color: #ccc;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
        }
        .controls button:hover { background: #444; }
    </style>
</head>
<body>
    <div class="controls">
        <input type="color" id="color" value="#000000">
        <label>Size <input type="range" id="size" min="1" max="100" value="20"></label>
        <label>Hardness <input type="range" id="hardness" min="0" max="100" value="80"></label>
        <label>Opacity <input type="range" id="opacity" min="1" max="100" value="100"></label>
        <label>Flow <input type="range" id="flow" min="1" max="100" value="80"></label>
        <label>Smooth <input type="range" id="smoothing" min="0" max="90" value="90"></label>
        <button id="clear">Clear</button>
    </div>
    <canvas id="canvas"></canvas>
    <script type="module" src="./index.js"></script>
</body>
</html>
